<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Reader - Reading View</title>
    <style>
        /* 基础变量延续轻奢移动端风格 */
        :root {
            --bg-color: #faf8f5;
            --text-main: #1a1a1a;
            --text-body: #333333;       /* 正文颜色略浅于标题，减轻视觉负担 */
            --accent-gold: #bfa175;
            --text-muted: #999999;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
            /* 优化字体渲染，让文字边缘更平滑 */
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
        }

        /* 阅读页主容器 */
        .reading-container {
            width: 100vw;
            min-height: 100vh;
            padding: 0 6vw 10vh 6vw; /* 左右边距适中，保证单行字数在 18-22 字左右的最佳阅读区间 */
            box-sizing: border-box;
        }

        /* =========================================
           正文顶部的章节标题设计
           ========================================= */
        .chapter-header {
            margin-top: 8vh; /* 顶部留白，模拟翻页后的呼吸空间 */
            margin-bottom: 3rem;
        }

        .chapter-num {
            font-size: 0.85rem;
            color: var(--accent-gold);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            display: block;
            font-weight: 500;
        }

        .chapter-title {
            font-size: 1.6rem;
            color: var(--text-main);
            font-weight: 500;
            margin: 0;
            line-height: 1.4;
            letter-spacing: 1px;
        }

        /* 标题与正文之间的优雅分割线 */
        .chapter-title::after {
            content: '';
            display: block;
            width: 32px;
            height: 2px;
            background-color: var(--accent-gold);
            margin-top: 1.2rem;
            opacity: 0.6;
            border-radius: 1px;
        }

        /* =========================================
           正文排版（极致的呼吸感）
           ========================================= */
        .chapter-content {
            font-size: 1.15rem; /* 适合大多数手机的舒适字号 */
            line-height: 2.1;   /* 增加行高，提升呼吸感 */
            color: var(--text-body);
            text-align: justify; /* 强制两端对齐，消除右侧参差不齐 */
        }

        .chapter-content p {
            margin-top: 0;
            margin-bottom: 1.2em; /* 段落间距，比行距略大，形成视觉停顿 */
            text-indent: 2em;    /* 标准中文首行缩进 */
        }

        /* 底部阅读进度辅助（可选） */
        .reading-footer {
            position: fixed;
            bottom: 2vh;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="reading-container">

        <header class="chapter-header">
            <span class="chapter-num">第一章</span>
            <h1 class="chapter-title">山边小村</h1>
        </header>

        <article class="chapter-content">
            <p>二愣子睁大着双眼，直直望着茅草和烂泥糊成的黑屋顶，身上盖着的旧棉被，已呈深黄色，看不出原来的本来面目，还若有若无的散发着淡淡的霉味。</p>

            <p>在他身边紧挨着的另一人，是二哥韩铸，酣睡的十分香甜，从他身上不时传来轻重不一的阵阵打呼声。</p>

            <p>离床大约半丈远的地方，是一堵黄泥糊成的土墙，因为时间过久，墙壁上裂开了几丝不起眼的细长口子，从这些裂纹中隐隐透进一丝光亮，给昏暗的屋内带来了少许光线。</p>
        </article>

    </div>

    <div class="reading-footer">
        12:30 • 1 / 15 页
    </div>

</body>
</html>
