<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Reader - Auto Dark Mode</title>
    <style>
        /* * 1. 定义亮色（默认）主题变量
         */
        :root {
            --bg-color: #faf8f5;
            --text-main: #1a1a1a;
            --text-body: #333333;
            --accent-gold: #bfa175;
            --text-muted: #999999;

            /* 悬浮按钮专属样式 */
            --btn-bg: #ffffff;
            --btn-icon: #333333;
            --btn-shadow: rgba(0, 0, 0, 0.1);
        }

        /* * 2. 定义暗色主题变量
         * 采用不反光的深木炭灰作为背景，文字使用低对比度的柔和灰白
         */
        [data-theme="dark"] {
            --bg-color: #171718;        /* 深木炭灰，非纯黑 */
            --text-main: #e0e0e0;       /* 柔和白，避免刺眼 */
            --text-body: #9e9e9e;       /* 适合长文阅读的浅灰 */
            --accent-gold: #cfa875;     /* 暗色模式下，烫金色稍微提亮以保证可见度 */
            --text-muted: #666666;

            --btn-bg: #2d2d2d;
            --btn-icon: #e0e0e0;
            --btn-shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;

            /* 给背景和文字颜色加上过渡动画，让切换更丝滑 */
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .reading-container {
            width: 100vw;
            min-height: 100vh;
            padding: 0 6vw 10vh 6vw;
            box-sizing: border-box;
        }

        .chapter-header {
            margin-top: 8vh;
            margin-bottom: 3rem;
        }

        .chapter-num {
            font-size: 0.85rem;
            color: var(--accent-gold);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            display: block;
            font-weight: 500;
            transition: color 0.4s ease;
        }

        .chapter-title {
            font-size: 1.6rem;
            color: var(--text-main);
            font-weight: 500;
            margin: 0;
            line-height: 1.4;
            letter-spacing: 1px;
            transition: color 0.4s ease;
        }

        .chapter-title::after {
            content: '';
            display: block;
            width: 32px;
            height: 2px;
            background-color: var(--accent-gold);
            margin-top: 1.2rem;
            opacity: 0.6;
            border-radius: 1px;
            transition: background-color 0.4s ease;
        }

        .chapter-content {
            font-size: 1.15rem;
            line-height: 2.1;
            color: var(--text-body);
            text-align: justify;
            transition: color 0.4s ease;
        }

        .chapter-content p {
            margin-top: 0;
            margin-bottom: 1.2em;
            text-indent: 2em;
        }

        .reading-footer {
            position: fixed;
            bottom: 2vh;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            transition: color 0.4s ease;
        }

        /* * =========================================
         * 主题切换按钮样式
         * =========================================
         */
        .theme-toggle-btn {
            position: fixed;
            bottom: 4vh;
            right: 6vw;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--btn-bg);
            box-shadow: 0 4px 12px var(--btn-shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle-btn:active {
            transform: scale(0.9);
        }

        /* 使用 SVG 绘制月亮/太阳图标 */
        .theme-toggle-btn svg {
            width: 22px;
            height: 22px;
            fill: var(--btn-icon);
            transition: fill 0.3s ease;
        }

        /* 默认隐藏太阳图标，显示月亮 */
        .icon-sun { display: none; }
        .icon-moon { display: block; }

        /* 在暗色模式下，隐藏月亮图标，显示太阳 */
        [data-theme="dark"] .icon-sun { display: block; }
        [data-theme="dark"] .icon-moon { display: none; }

    </style>
</head>
<body>

    <div class="reading-container">
        <header class="chapter-header">
            <span class="chapter-num">第一章</span>
            <h1 class="chapter-title">山边小村</h1>
        </header>

        <article class="chapter-content">
            <p>二愣子睁大着双眼，直直望着茅草和烂泥糊成的黑屋顶，身上盖着的旧棉被，已呈深黄色，看不出原来的本来面目，还若有若无的散发着淡淡的霉味。</p>

            <p>在他身边紧挨着的另一人，是二哥韩铸，酣睡的十分香甜，从他身上不时传来轻重不一的阵阵打呼声。</p>

            <p>离床大约半丈远的地方，是一堵黄泥糊成的土墙，因为时间过久，墙壁上裂开了几丝不起眼的细长口子，从这些裂纹中隐隐透进一丝光亮，给昏暗的屋内带来了少许光线。</p>
        </article>
    </div>

    <div class="reading-footer">
        12:30 • 1 / 15 页
    </div>

    <div class="theme-toggle-btn" id="themeToggle">
        <svg class="icon-moon" viewBox="0 0 24 24">
            <path d="M12.1,22c-5.1,0-9.2-4.1-9.2-9.2c0-4.1,2.7-7.8,6.6-8.9c0.4-0.1,0.8,0.2,0.9,0.5c0.1,0.4-0.1,0.8-0.4,0.9
            c-3.1,1.1-5.1,4.1-5.1,7.5c0,4,3.3,7.2,7.2,7.2c3.4,0,6.4-2,7.5-5.1c0.1-0.4,0.5-0.5,0.9-0.4c0.4,0.1,0.6,0.5,0.5,0.9
            C19.9,19.3,16.2,22,12.1,22z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24">
            <path d="M12,17c-2.8,0-5-2.2-5-5s2.2-5,5-5s5,2.2,5,5S14.8,17,12,17z M12,9c-1.7,0-3,1.3-3,3s1.3,3,3,3s3-1.3,3-3S13.7,9,12,9z"/>
            <path d="M12,4c-0.6,0-1-0.4-1-1V1c0-0.6,0.4-1,1-1s1,0.4,1,1v2C13,3.6,12.6,4,12,4z"/>
            <path d="M12,24c-0.6,0-1-0.4-1-1v-2c0-0.6,0.4-1,1-1s1,0.4,1,1v2C13,23.6,12.6,24,12,24z"/>
            <path d="M4,12c0-0.6-0.4-1-1-1H1c-0.6,0-1,0.4-1,1s0.4,1,1,1h2C3.6,13,4,12.6,4,12z"/>
            <path d="M23,13h-2c-0.6,0-1-0.4-1-1s0.4-1,1-1h2c0.6,0,1,0.4,1,1S23.6,13,23,13z"/>
            <path d="M6.3,6.3C6.1,6.5,5.9,6.6,5.6,6.6C5.4,6.6,5.1,6.5,4.9,6.3l-1.4-1.4c-0.4-0.4-0.4-1,0-1.4s1-0.4,1.4,0l1.4,1.4
            C6.7,5.3,6.7,5.9,6.3,6.3z"/>
            <path d="M19.1,19.1c-0.2,0.2-0.4,0.3-0.7,0.3s-0.5-0.1-0.7-0.3l-1.4-1.4c-0.4-0.4-0.4-1,0-1.4s1-0.4,1.4,0l1.4,1.4
            C19.5,18.1,19.5,18.7,19.1,19.1z"/>
            <path d="M4.9,19.1c-0.2,0.2-0.4,0.3-0.7,0.3s-0.5-0.1-0.7-0.3c-0.4-0.4-0.4-1,0-1.4l1.4-1.4c0.4-0.4,1-0.4,1.4,0s0.4,1,0,1.4
            L4.9,19.1z"/>
            <path d="M19.1,6.3c-0.4,0.4-1,0.4-1.4,0l-1.4-1.4c-0.4-0.4-0.4-1,0-1.4s1-0.4,1.4,0l1.4,1.4C19.5,5.3,19.5,5.9,19.1,6.3z"/>
        </svg>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            // 检查当前的自定义属性是否为 dark
            if (htmlElement.getAttribute('data-theme') === 'dark') {
                htmlElement.removeAttribute('data-theme'); // 切换回亮色
            } else {
                htmlElement.setAttribute('data-theme', 'dark'); // 切换到暗色
            }
        });
    </script>

</body>
</html>
