# MoRealm Pre-commit Hooks
# Install: pre-commit install && pre-commit install --hook-type pre-push
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: 去除行尾空格
      - id: end-of-file-fixer
        name: 文件末尾换行符
      - id: check-yaml
        name: YAML 语法检查
      - id: check-json
        name: JSON 语法检查
      - id: check-merge-conflict
        name: 合并冲突标记检查
      - id: check-added-large-files
        name: 大文件检查
        args: ['--maxkb=2048']
      - id: detect-private-key
        name: 私钥泄露检查

  - repo: local
    hooks:
      - id: license-check
        name: MIT 许可证检查
        entry: "bash -c 'test -f LICENSE && grep -q MIT LICENSE'"
        language: system
        pass_filenames: false

      - id: mvvm-boundary-check
        name: MVVM 层级边界检查
        entry: "bash -c '
          ERRORS=0;
          UI_DIR=app/src/main/java/com/morealm/app/ui;
          PRES_DIR=app/src/main/java/com/morealm/app/presentation;
          DOM_DIR=app/src/main/java/com/morealm/app/domain;

          # 1. UI层禁止引用domain业务模块(db/repository/parser/sync/source/rule/tts/preference)
          for MOD in db repository parser sync source rule tts preference; do
            HITS=$(grep -rn \"import com.morealm.app.domain.$MOD\" $UI_DIR --include=\"*.kt\" 2>/dev/null);
            if [ -n \"$HITS\" ]; then
              echo \"ERROR [UI→domain.$MOD] UI层不应直接引用domain业务模块:\";
              echo \"$HITS\";
              ERRORS=$((ERRORS+1));
            fi;
          done;

          # 2. domain层禁止引用ui层和presentation层
          HITS=$(grep -rn \"import com.morealm.app.ui\\|import com.morealm.app.presentation\" $DOM_DIR --include=\"*.kt\" 2>/dev/null);
          if [ -n \"$HITS\" ]; then
            echo \"ERROR [domain→ui/presentation] domain层不应引用上层:\";
            echo \"$HITS\";
            ERRORS=$((ERRORS+1));
          fi;

          # 3. presentation层禁止引用ui层
          HITS=$(grep -rn \"import com.morealm.app.ui\" $PRES_DIR --include=\"*.kt\" 2>/dev/null);
          if [ -n \"$HITS\" ]; then
            echo \"ERROR [presentation→ui] presentation层不应引用ui层:\";
            echo \"$HITS\";
            ERRORS=$((ERRORS+1));
          fi;

          # 4. presentation层禁止引用Compose
          HITS=$(grep -rn \"import androidx.compose\" $PRES_DIR --include=\"*.kt\" 2>/dev/null);
          if [ -n \"$HITS\" ]; then
            echo \"ERROR [presentation→compose] presentation层不应引用Compose:\";
            echo \"$HITS\";
            ERRORS=$((ERRORS+1));
          fi;

          [ $ERRORS -eq 0 ] && echo \"MVVM 边界检查通过\";
          [ $ERRORS -eq 0 ]
        '"
        language: system
        files: '\.kt$'
        pass_filenames: false

      - id: no-secrets
        name: 敏感信息检查
        entry: "bash -c 'grep -rn \"password.*=.*\\\"[a-zA-Z0-9]\" app/src/main/java/ --include=\"*.kt\" | grep -v \"test\\|= \\\"\\\"\" && exit 1; true'"
        language: system
        pass_filenames: false

      - id: manifest-class-check
        name: AndroidManifest 类引用检查
        entry: "bash -c 'ERRORS=0; for CLASS in $(sed -n \"s/.*android:name=\\\"\\.\\([^\\\"]*\\)\\\".*/\\1/p\" app/src/main/AndroidManifest.xml); do F=\"app/src/main/java/$(echo com.morealm.app.$CLASS | tr . /)\"; if [ ! -f \"$F.kt\" ] && [ ! -f \"$F.java\" ]; then echo \"ERROR: 类不存在: com.morealm.app.$CLASS\"; ERRORS=$((ERRORS+1)); fi; done; [ $ERRORS -eq 0 ]'"
        language: system
        files: '(AndroidManifest\.xml|\.kt)$'
        pass_filenames: false

      - id: gradle-compile
        name: Kotlin 编译检查
        entry: "bash -c './gradlew compileDebugKotlin --daemon -q'"
        language: system
        files: '\.kt$|\.kts$'
        pass_filenames: false
        stages: [pre-push]

      - id: gradle-test
        name: 单元测试
        entry: "bash -c './gradlew testDebugUnitTest --daemon -q'"
        language: system
        files: '\.kt$'
        pass_filenames: false
        stages: [pre-push]

      - id: unit-test-quick
        name: 单元测试 (快速)
        entry: "bash -c './gradlew testDebugUnitTest --daemon -q --tests \"com.morealm.app.domain.*\" --tests \"com.morealm.app.core.*\" 2>&1 | tail -5'"
        language: system
        files: '\.kt$'
        pass_filenames: false

      - id: inline-regex-check
        name: 内联 Regex 编译检查
        entry: "bash -c '
          HITS=$(grep -rn \"Regex(\" app/src/main/java/com/morealm/app/ --include=\"*.kt\" \
            | grep -v \"object \" | grep -v \"companion \" | grep -v \"val .*= Regex\" \
            | grep -v \"AppPattern\" | grep -v \"import \" | grep -v \"ttsSkipRegex\" \
            | grep -v \"//\" | grep -v \"getCachedRegex\" | grep -v \"test/\");
          if [ -n \"$HITS\" ]; then
            echo \"WARNING: 发现内联 Regex() 编译，应使用 AppPattern 预编译常量:\";
            echo \"$HITS\";
          fi;
          true
        '"
        language: system
        files: '\.kt$'
        pass_filenames: false

      - id: thread-blocking-check
        name: 主线程阻塞检查
        entry: "bash -c '
          ERRORS=0;
          # Thread.sleep in non-test, non-log code
          HITS=$(grep -rn \"Thread\\.sleep\" app/src/main/java/com/morealm/app/ --include=\"*.kt\" \
            | grep -v \"core/log/\" | grep -v \"test/\");
          if [ -n \"$HITS\" ]; then
            echo \"ERROR: Thread.sleep 应替换为 delay():\";
            echo \"$HITS\";
            ERRORS=$((ERRORS+1));
          fi;
          # runBlocking without Dispatchers
          HITS=$(grep -rn \"runBlocking\\s*{\" app/src/main/java/com/morealm/app/ --include=\"*.kt\");
          if [ -n \"$HITS\" ]; then
            echo \"ERROR: runBlocking 缺少 Dispatchers.IO:\";
            echo \"$HITS\";
            ERRORS=$((ERRORS+1));
          fi;
          # viewModelScope.launch without Dispatcher (DB/IO operations)
          HITS=$(grep -rn \"viewModelScope\\.launch\\s*{\" app/src/main/java/com/morealm/app/presentation/ --include=\"*.kt\" \
            | grep -v \"prefs\\.set\" | grep -v \"_show\" | grep -v \"_auto\");
          if [ -n \"$HITS\" ]; then
            echo \"WARNING: viewModelScope.launch 缺少 Dispatchers.IO (如含 DB/IO 操作请加上):\";
            echo \"$HITS\";
          fi;
          [ $ERRORS -eq 0 ]
        '"
        language: system
        files: '\.kt$'
        pass_filenames: false

      - id: mutable-stateflow-exposure-check
        name: MutableStateFlow 公开暴露检查
        entry: "bash -c '
          HITS=$(grep -rn \"val [a-z]\\w* = MutableStateFlow\" app/src/main/java/com/morealm/app/presentation/ --include=\"*.kt\" \
            | grep -v \"private \");
          if [ -n \"$HITS\" ]; then
            echo \"ERROR: MutableStateFlow 不应公开暴露，应使用 private + asStateFlow():\";
            echo \"$HITS\";
            exit 1;
          fi;
          true
        '"
        language: system
        files: '\.kt$'
        pass_filenames: false

      - id: compose-pointer-input-stale-closure
        name: Compose pointerInput 闭包陈旧值检查
        entry: "bash -c '
          ERRORS=0;
          # pointerInput(Unit) 的闭包在整个 Composable 生命周期内不重建，
          # 内部引用的外部 val 会被值捕获而陈旧。必须用 rememberUpdatedState 包装。
          # 详见 docs/page-turn-bug-analysis.md
          for f in $(grep -rl \"pointerInput\" app/src/main/java/com/morealm/app/ui/ --include=\"*.kt\" 2>/dev/null); do
            HAS_RUS=$(grep -c \"rememberUpdatedState\" \"$f\" 2>/dev/null || echo 0);
            HAS_PI=$(grep -c \"pointerInput(Unit)\" \"$f\" 2>/dev/null || echo 0);
            if [ \"$HAS_PI\" -gt 0 ] && [ \"$HAS_RUS\" -eq 0 ]; then
              echo \"ERROR [$f]: pointerInput(Unit) 但无 rememberUpdatedState — 闭包将捕获陈旧值\";
              ERRORS=$((ERRORS+1));
            fi;
          done;
          [ $ERRORS -eq 0 ]
        '"
        language: system
        files: '\.kt$'
        pass_filenames: false

      - id: compose-drag-state-guard-check
        name: Compose 拖拽状态守卫检查
        entry: "bash -c '
          # onDragStart 中不应用 if(state==IDLE) 守卫跳过状态重置。
          # 应无条件 abort + 重置（移植自 Legado ACTION_DOWN → abortAnim() + onDown()）
          HITS=$(grep -rn \"onDragStart\" app/src/main/java/com/morealm/app/ui/ --include=\"*.kt\" -A8 \
            | grep -i \"if.*dragState.*IDLE\\|if.*state.*==.*IDLE\");
          if [ -n \"$HITS\" ]; then
            echo \"WARNING: onDragStart 使用 IDLE 守卫跳过重置 — 应无条件 abort (Legado 模式)\";
            echo \"$HITS\";
          fi;
          true
        '"
        language: system
        files: '\.kt$'
        pass_filenames: false
